name: Lint

# Every run step delegates to scripts/ci-local.sh so this workflow, the
# local `make ci-local` target, and the /release skill's Phase 5 validate
# the exact same inventory. Tool installation stays here (a CI concern);
# the script asserts presence and fails loud.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts (incl. stamped *.sh.template)
        run: bash scripts/ci-local.sh shellcheck

  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Provide a managed Python so `pip install` does not depend on the
      # hosted runner image happening to permit installs into the system
      # interpreter (PEP 668 / externally-managed-environment). Mirrors
      # security.yml so both workflows resolve Python the same way.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install jq and check-jsonschema
        # check-jsonschema pinned (not 'latest') for reproducible CI —
        # mirrors the bandit/semgrep pins in security.yml. Not
        # dependabot-tracked: no Python manifest (see
        # .github/dependabot.yml). Bump by hand.
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          python3 -m pip install --quiet check-jsonschema==0.37.2
      - name: Validate JSON, schema, and negative fixtures
        run: bash scripts/ci-local.sh json

  doctrine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run doctrine grep checks
        run: bash scripts/ci-local.sh doctrine

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run all test suites (tests/*/run.sh + hooks-audit)
        run: bash scripts/ci-local.sh tests
      - name: Verify bundled examples (verify.sh, permalink density, eval dry-run)
        run: bash scripts/ci-local.sh examples
