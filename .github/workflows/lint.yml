name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          set -e
          shopt -s globstar nullglob
          # *.sh.template covers the scripts stamped into user repos —
          # without it the stamped bundle escapes the lint entirely.
          # -s bash because shellcheck cannot infer a dialect from the
          # .template extension.
          files=( **/*.sh **/*.sh.template )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell files found."
            exit 0
          fi
          shellcheck -s bash --severity=warning "${files[@]}"

  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Provide a managed Python so `pip install` does not depend on the
      # hosted runner image happening to permit installs into the system
      # interpreter (PEP 668 / externally-managed-environment). Mirrors
      # security.yml so both workflows resolve Python the same way.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Validate production JSON files
        run: |
          set -e
          paths=(
            ".claude/settings.json"
            ".claude-plugin/marketplace.json"
            "plugin/skill-engine/.claude-plugin/plugin.json"
            "plugin/skill-engine/engine-bootstrap-templates/research-state.json.template"
            "plugin/skill-engine/engine-bootstrap-templates/source-paths.json.template"
            "plugin/skill-engine/engine-bootstrap-templates/monorepo-config.json.template"
          )
          for f in "${paths[@]}"; do
            if [ -f "$f" ]; then
              echo "Validating $f"
              jq empty "$f"
            else
              echo "Skipping $f (not present)"
            fi
          done
      - name: Validate source-paths.json against its schema
        run: |
          set -e
          # Pinned (not 'latest') for reproducible CI — mirrors the bandit/
          # semgrep pins in security.yml. Not dependabot-tracked: no Python
          # manifest (see .github/dependabot.yml). Bump by hand.
          python3 -m pip install --quiet check-jsonschema==0.37.2
          schema="plugin/skill-engine/engine-bootstrap-templates/source-paths.schema.json"
          echo "Meta-validating the schema"
          check-jsonschema --check-metaschema "$schema"
          targets=( "plugin/skill-engine/engine-bootstrap-templates/source-paths.json.template" )
          for f in examples/*/research/source-paths.json; do
            [ -f "$f" ] && targets+=( "$f" )
          done
          # One invocation validates every target — avoids a cold start and a
          # schema recompile per file.
          echo "Validating ${#targets[@]} file(s) against the schema in one pass"
          check-jsonschema --schemafile "$schema" "${targets[@]}"
      - name: Invalid fixtures must fail the schema (verify.sh equivalence)
        run: |
          set -e
          # The schema header claims to transcribe the contract verify.sh
          # enforces. The invalid fixtures already run through verify.sh
          # (tests/web-doc); running them through the schema too, expecting
          # rejection, makes the equivalence a tested property instead of a
          # prose claim — the crawl_budget kind-scoping divergence existed
          # precisely because nothing exercised this direction.
          schema="plugin/skill-engine/engine-bootstrap-templates/source-paths.schema.json"
          status=0
          for f in plugin/skill-engine/tests/web-doc/fixtures/schema/invalid/*.json; do
            case "$(basename "$f")" in
              # The schema's single declared gap: page_list same-origin is
              # not expressible in JSON Schema (see the schema's $comment);
              # only verify.sh enforces it, so this fixture legitimately
              # passes here.
              invalid--page-list-cross-origin.json)
                echo "skipped (declared schema gap): $f"
                continue ;;
            esac
            if check-jsonschema --schemafile "$schema" "$f" >/dev/null 2>&1; then
              echo "FAIL: invalid fixture passed schema validation: $f"
              status=1
            else
              echo "rejected as expected: $f"
            fi
          done
          exit "$status"

  doctrine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run doctrine grep checks
        run: bash plugin/skill-engine/tests/doctrine.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run web-doc tests
        run: bash plugin/skill-engine/tests/web-doc/run.sh
      - name: Run clean-cache tests
        run: bash plugin/skill-engine/tests/clean-cache/run.sh
      - name: Run migration tests
        run: bash plugin/skill-engine/tests/migration/run.sh
      - name: Run permalink-density tests
        run: bash plugin/skill-engine/tests/permalink-density/run.sh
      - name: Run grounded-rate tests
        run: bash plugin/skill-engine/tests/grounded-rate/run.sh
      - name: Run verify-bijection tests
        run: bash plugin/skill-engine/tests/verify-bijection/run.sh
      - name: Verify bundled example contextualizers
        run: |
          set -e
          for v in examples/*/verify.sh; do
            echo "== $v =="
            bash "$v"
          done
      - name: Permalink density on example references
        run: |
          set -e
          for refs in examples/*/references; do
            [ -d "$refs" ] || continue
            echo "== $refs =="
            python3 plugin/skill-engine/tests/permalink_density.py "$refs" --threshold 0.80 --min-paragraphs 5 --require-min-paragraphs
          done
      - name: Validate example eval corpora (grounded-rate dry-run)
        run: |
          set -e
          for ctx in examples/*/; do
            [ -f "$ctx/research/eval-prompts.json" ] || continue
            echo "== $ctx =="
            python3 plugin/skill-engine/tests/grounded_rate.py "$ctx" --dry-run
          done
