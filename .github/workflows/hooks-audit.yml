name: Hooks Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hooks-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ubuntu-latest already ships jq, so no apt install is needed (the
      # sibling security.yml avoids apt for the same reason — it keeps a flaky
      # network step out of CI).
      - name: Run hooks audit
        run: bash plugin/skill-engine/tests/hooks-audit.sh
