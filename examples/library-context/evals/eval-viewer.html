<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>library-context eval viewer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
  .file-picker { padding: 0.75rem; border: 1px dashed #999; border-radius: 6px; margin-bottom: 1.5rem; }
  .summary { background: #f4f6f8; padding: 1rem 1.25rem; border-radius: 6px; margin-bottom: 1.5rem; }
  .summary table { border-collapse: collapse; }
  .summary td { padding: 0.25rem 1rem 0.25rem 0; }
  .summary td.label { color: #555; }
  table.entries { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  table.entries th, table.entries td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
  table.entries th { background: #f4f6f8; font-weight: 600; }
  .vote-pass { color: #197d3a; font-weight: 600; }
  .vote-fail { color: #b3261e; font-weight: 600; }
  .flicker { background: #fff4d6; border: 1px solid #f0c040; border-radius: 4px; padding: 0 0.4rem; font-size: 0.85rem; margin-left: 0.5rem; }
  .runs { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9rem; color: #444; }
  .persona-tag { display: inline-block; background: #e6ecf2; border-radius: 4px; padding: 0 0.5rem; font-size: 0.8rem; color: #345; margin-left: 0.5rem; }
  .empty { color: #888; font-style: italic; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
  <h1>library-context eval viewer</h1>
  <div class="subtitle">Local viewer for results-*.json produced by run-eval.sh. No network, no external scripts.</div>

  <div class="file-picker">
    <label for="results-input"><strong>Load a results file:</strong></label>
    <input id="results-input" type="file" accept=".json,application/json">
  </div>

  <div id="output" class="empty">Pick a results-*.json file to render.</div>

<script>
  (function () {
    var input = document.getElementById('results-input');
    var output = document.getElementById('output');

    input.addEventListener('change', function (event) {
      var file = event.target.files && event.target.files[0];
      if (!file) { return; }
      var reader = new FileReader();
      reader.onload = function () {
        var raw = reader.result;
        // Pre-parse strict integer check on schema_version. JSON.parse coerces
        // 1.0 to 1 and Number.isInteger then accepts it, hiding the float —
        // matching the bash-side rejection requires inspecting the raw text.
        var sv = raw.match(/"schema_version"\s*:\s*([^,}\]\s][^,}\]]*?)\s*[,}\]]/);
        if (sv && !/^[1-9][0-9]*$/.test(sv[1])) {
          output.className = 'empty';
          output.textContent = 'ERROR: schema_version must be a JSON integer >= 1; got: ' + sv[1];
          return;
        }
        var data;
        try {
          data = JSON.parse(raw);
        } catch (err) {
          output.className = 'empty';
          output.textContent = 'ERROR: file is not valid JSON (' + err.message + ').';
          return;
        }
        render(data);
      };
      reader.onerror = function () {
        output.className = 'empty';
        output.textContent = 'ERROR: could not read file.';
      };
      reader.readAsText(file);
    });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function voteOf(runs) {
      var pass = 0;
      for (var i = 0; i < runs.length; i++) {
        if (runs[i] === 'pass') pass++;
      }
      return (pass * 2 > runs.length) ? 'pass' : 'fail';
    }

    function flickerOf(runs) {
      var pass = 0, fail = 0;
      for (var i = 0; i < runs.length; i++) {
        if (runs[i] === 'pass') pass++;
        else if (runs[i] === 'fail') fail++;
      }
      return pass > 0 && fail > 0;
    }

    function render(data) {
      var schemaVersion = data.schema_version;
      if (schemaVersion === undefined || schemaVersion === null) {
        schemaVersion = 1;
      } else if (typeof schemaVersion !== 'number' || !Number.isInteger(schemaVersion) || schemaVersion < 1) {
        output.className = 'empty';
        output.textContent = 'ERROR: schema_version must be a JSON integer >= 1; got: ' + JSON.stringify(data.schema_version);
        return;
      }
      if (schemaVersion !== 1) {
        output.className = 'empty';
        output.textContent = 'ERROR: viewer understands schema_version 1; got: ' + schemaVersion;
        return;
      }

      var entries = data.entries;
      if (!Array.isArray(entries)) {
        output.className = 'empty';
        output.textContent = 'ERROR: data.entries must be a JSON array; got: ' + (entries === undefined ? 'undefined' : typeof entries);
        return;
      }
      // Overall is tracked separately from per-persona totals so a user-supplied
      // persona value (e.g., the literal string "__overall__") cannot collide
      // with the synthetic overall bucket and double-count.
      var overall = { pass: 0, total: 0 };
      var totals = {};
      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i];
        var persona = entry.persona || 'domain-expert';
        if (!totals[persona]) totals[persona] = { pass: 0, total: 0 };
        var entryRuns = Array.isArray(entry.runs) ? entry.runs : [];
        totals[persona].total++;
        overall.total++;
        var vote = voteOf(entryRuns);
        if (vote === 'pass') {
          totals[persona].pass++;
          overall.pass++;
        }
      }

      var html = '';
      html += '<h2>Run summary</h2>';
      html += '<div class="summary"><table>';
      html += '<tr><td class="label">Navigator:</td><td>' + escapeHtml(data.navigator || 'library-context') + '</td></tr>';
      if (data.started_at) {
        html += '<tr><td class="label">Started:</td><td>' + escapeHtml(data.started_at) + '</td></tr>';
      }
      if (data.ended_at) {
        html += '<tr><td class="label">Ended:</td><td>' + escapeHtml(data.ended_at) + '</td></tr>';
      }
      html += '<tr><td class="label">Entries:</td><td>' + entries.length + '</td></tr>';
      html += '</table></div>';

      html += '<h2>Pass rates (majority vote of three runs)</h2>';
      html += '<div class="summary"><table>';
      html += '<tr><td class="label">overall:</td><td>' + overall.pass + ' / ' + overall.total + '</td></tr>';
      var personaKeys = Object.keys(totals).sort();
      for (var p = 0; p < personaKeys.length; p++) {
        var pk = personaKeys[p];
        html += '<tr><td class="label">' + escapeHtml(pk) + ':</td><td>' + totals[pk].pass + ' / ' + totals[pk].total + '</td></tr>';
      }
      html += '</table></div>';

      html += '<h2>Per-entry detail</h2>';
      html += '<table class="entries"><thead><tr>';
      html += '<th>Vote</th><th>Query</th><th>Expected</th><th>Persona</th><th>Runs</th>';
      html += '</tr></thead><tbody>';
      for (var j = 0; j < entries.length; j++) {
        var e = entries[j];
        var runs = Array.isArray(e.runs) ? e.runs : [];
        var v = voteOf(runs);
        var fl = flickerOf(runs);
        html += '<tr>';
        html += '<td><span class="vote-' + v + '">' + v + '</span>' + (fl ? '<span class="flicker">flicker</span>' : '') + '</td>';
        html += '<td>' + escapeHtml(e.query || '') + '</td>';
        html += '<td>' + escapeHtml(e.expected || '') + '</td>';
        html += '<td><span class="persona-tag">' + escapeHtml(e.persona || 'domain-expert') + '</span></td>';
        html += '<td class="runs">' + escapeHtml(runs.join(', ')) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';

      output.className = '';
      output.innerHTML = html;
    }
  })();
</script>
</body>
</html>
